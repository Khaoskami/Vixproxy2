<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found - VixProxy</title>
  <link rel="stylesheet" href="/index.css">
  <style>
    .not-found {
      text-align: center;
      margin-top: 10vh;
    }
    .glitch {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 1rem;
      position: relative;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.98); filter: hue-rotate(15deg); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="not-found">
      <div class="glitch">404</div>
      <h2 style="font-size: 2rem; margin-bottom: 2rem; font-weight: 500;">Lost in the void.</h2>
      <p style="color: var(--text-muted); margin-bottom: 3rem; font-size: 1.1rem;">
        The endpoint or dimension you are looking for doesn't exist.
      </p>
      <a href="/dashboard" class="btn btn-primary" style="padding: 1rem 2rem;">Return to Reality</a>
    </div>
  </div>
</body>
</html>
